		// Format numeric values with 2 decimal places for popup display
		function formatNumber(value) {
			if (value === null || value === undefined || value === '') return '';
			if (!isNaN(value)) {
				return Number(value).toFixed(2);
			}
			return value;
		}
		
		// Global reference to the currently highlighted feature
		var highlightLayer;
		
		// Highlight a feature on mouseover and open its popup
        function highlightFeature(e) {
            highlightLayer = e.target;

            if (e.target.feature.geometry.type === 'LineString' || e.target.feature.geometry.type === 'MultiLineString') {
              highlightLayer.setStyle({
                color: 'rgba(255, 255, 0, 1.00)',
              });
            } else {
              highlightLayer.setStyle({
                fillColor: 'rgba(255, 255, 0, 1.00)',
                fillOpacity: 1
              });
            }
            highlightLayer.openPopup();
        }

		// Automatically convert URLs in popup text into clickable links
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        
		// Remove popup rows where the related attribute is empty
        function removeEmptyRowsFromPopupContent(content, feature) {
			var tempDiv = document.createElement('div');
			tempDiv.innerHTML = content;
			var rows = tempDiv.querySelectorAll('tr');
			for (var i = 0; i < rows.length; i++) {
				var td = rows[i].querySelector('td.visible-with-data');
				var key = td ? td.id : '';
				if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
					 rows[i].parentNode.removeChild(rows[i]);
				}
			}
			 return tempDiv.innerHTML;
        }
		
        // Add CSS class for media popups and replace media placeholders if needed
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
					
                    // Update popup size once video metadata is loaded
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

                            e.target._eventParents[i].resetStyle(e.target);
                        }

                        layer.closePopup();
                    } else {

                            feature.closePopup()
                        });
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['OBJECTID'] !== null ? autolinker.link(String(feature.properties['OBJECTID']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\

            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

                pane: 'pane_Stockholm_4',
                opacity: 1,
                color: 'rgba(149,162,172,1.0)',
                dashArray: '',
                lineCap: 'square',
                lineJoin: 'bevel',
                weight: 4.0,
                fillOpacity: 0,
                interactive: false,
            }
        }
		
		// Create pane and layer for the Stockholm boundary
        map.createPane('pane_Stockholm_4');
        map.getPane('pane_Stockholm_4').style.zIndex = 404;
        map.getPane('pane_Stockholm_4').style['mix-blend-mode'] = 'normal';
        
		var layer_Stockholm_4 = new L.geoJson(json_Stockholm_4, {
            attribution: '',
            interactive: false,
            dataVar: 'json_Stockholm_4',
            layerName: 'layer_Stockholm_4',
            pane: 'pane_Stockholm_4',
            onEachFeature: pop_Stockholm_4,
            style: style_Stockholm_4_0,
        });
        bounds_group.addLayer(layer_Stockholm_4);
        map.addLayer(layer_Stockholm_4);
        
		// Search provider URLs for the photon control
		const url = {"Nominatim OSM": "https://nominatim.openstreetmap.org/search?format=geojson&addressdetails=1&",
        "France BAN": "https://api-adresse.data.gouv.fr/search/?"}
        
		// Create the search control
		var photonControl = L.control.photon({
            url: url["Nominatim OSM"],
            feedbackLabel: '',
            position: 'topleft',
            includePosition: true,
            initial: true,
            // resultsHandler: myHandler,
        }).addTo(map);
        
		// Round search box corners
		photonControl._container.childNodes[0].style.borderRadius="10px"
        
		// Stores the selected search result geometry
        var x = null;
        
		// Stores the created marker for the selected search result
        var marker = null;
        
		// Extra variable for selected label text
        var z = null;
        
		// Add result geometry and marker when a search result is selected
		photonControl.on('selected', function(e) {
            console.log(photonControl.search.resultsContainer);
            if (x != null) {
                map.removeLayer(obj3.marker);
                map.removeLayer(x);
            }
            obj2.gcd = e.choice;
            x = L.geoJSON(obj2.gcd).addTo(map);
            var label = typeof obj2.gcd.properties.label === 'undefined' ? obj2.gcd.properties.display_name : obj2.gcd.properties.label;
            obj3.marker = L.marker(x.getLayers()[0].getLatLng()).bindPopup(label).addTo(map);
            map.setView(x.getLayers()[0].getLatLng(), 17);
            z = typeof e.choice.properties.label === 'undefined'? e.choice.properties.display_name : e.choice.properties.label;
            console.log(e);
            e.target.input.value = z;
        });
        
		// Style the search control to look like a toggleable search box
		var search = document.getElementsByClassName("leaflet-photon leaflet-control")[0];
        search.classList.add("leaflet-control-search")
        search.style.display = "flex";
        search.style.backgroundColor="rgba(255,255,255,0.5)" 

        // Create custom button for opening / closing the search input
        var button = document.createElement("div");
        button.id = "gcd-button-control";
        button.className = "gcd-gl-btn fa fa-search search-button";

        // Insert the button at the beginning of the search control
        search.insertBefore(button, search.firstChild);
        last = search.lastChild;
        last.style.display = "none";
		
		// Toggle search input visibility on button click
        button.addEventListener("click", function (e) {
            if (last.style.display === "none") {
                last.style.display = "block";
            } else {
                last.style.display = "none";
            }
        });
        
		// Define layer tree shown in the layer control
		var overlaysTree = [
			{
				label: '<div class="legend-title">Legend</div>'
			},
			{
				label: '<span class="legend-static-item"><img src="legend/Stockholm_4.png" /> Stockholm area</span>'
			},
			{
				label: '<span class="legend-static-item"><img src="legend/Allcrags_3.png" /> Crags</span>'
			},
			{
				label: '<b>Map</b>',
				selectAllCheckbox: true,
				children: [
					{label: '<img src="legend/Naturereserve_2.png" /> Nature reserve', layer: layer_Naturereserve_2},
					{label: '<img src="legend/Nationalpark_1.png" /> National park', layer: layer_Nationalpark_1},
					{label: 'Basemap', layer: layer_Basemap_0, radioGroup: 'bm'},
					{label: 'Orthofoto', layer: layer_ArcGIS_Imagery, radioGroup: 'bm'}
				]
			}
		];
		
		// Add tree-based layer control
		var lay = L.control.layers.tree(null, overlaysTree,{
            collapsed: false, 
        });
        
		lay.addTo(map);
		
		// Adjust layer control height and collapse behavior after page load
		document.addEventListener("DOMContentLoaded", function() {
			// set new Layers List height which considers toggle icon
            function newLayersListHeight() {
                var layerScrollbarElement = document.querySelector('.leaflet-control-layers-scrollbar');
                if (layerScrollbarElement) {
                    var layersListElement = document.querySelector('.leaflet-control-layers-list');
                    var originalHeight = layersListElement.style.height 
                        || window.getComputedStyle(layersListElement).height;
                    var newHeight = parseFloat(originalHeight) - 50;
                    layersListElement.style.height = newHeight + 'px';
                }
            }
			
			// Track current expanded / collapsed state
            var isLayersListExpanded = true;
            var controlLayersElement = document.querySelector('.leaflet-control-layers');
            var toggleLayerControl = document.querySelector('.leaflet-control-layers-toggle');
            
			// Toggle expanded state manually
            toggleLayerControl.addEventListener('click', function() {
                if (isLayersListExpanded) {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                } else {
                    controlLayersElement.classList.add('leaflet-control-layers-expanded');
                }
                isLayersListExpanded = !isLayersListExpanded;
                newLayersListHeight()
            });
			
			// Recalculate height when tree groups are opened or closed
			if (controlLayersElement) {
				controlLayersElement.addEventListener('click', function(event) {
					var toggleLayerHeaderPointer = event.target.closest('.leaflet-layerstree-header-pointer span');
					if (toggleLayerHeaderPointer) {
						newLayersListHeight();
					}
				});
			}
			
            // Toggle twice at startup to apply correct initial height
            setTimeout(function() {
                toggleLayerControl.click();
            }, 10);
            setTimeout(function() {
                toggleLayerControl.click();
            }, 10);
			
            // Collapse layer list automatically on small screens
            var isSmallScreen = window.innerWidth < 900;
            if (isSmallScreen) {
                setTimeout(function() {
                    controlLayersElement.classList.remove('leaflet-control-layers-expanded');
                    isLayersListExpanded = !isLayersListExpanded;
                }, 500);
            }  
        });

		// Integrate custom filter UI into the layer control
		var layersList = document.querySelector('.leaflet-control-layers-list');

		// Container for all filter controls
		var filterContainer = document.createElement("div");
		filterContainer.id = "filter-panel";

		// Filter UI HTML
		filterContainer.innerHTML = `
		<div class="leaflet-control-layers-separator"></div>

		<div class="legend-title">Filter</div>
		<div class="legend-space"></div>

		<label>Cliff height [m] ≥</label>
		<input type="number" id="filter_cliff">

		<label>Distance to streets [m] ≤</label>
		<input type="number" id="filter_distance">
		
		<label>Area [m²] ≥</label>
		<input type="number" id="filter_area">

		<label>Existing crags</label>
		<select id="filter_existing">
		  <option value="">All crags</option>
		</select>

		<label>Protected area</label>
		<select id="filter_protected">
		  <option value="">All</option>
		</select>

		<label>Island / Mainland</label>
		<select id="filter_island">
		  <option value="">All</option>
		</select>

		<label>Coast / Inland</label>
		<select id="filter_coast">
		  <option value="">All</option>
		</select>

		<label>Land use</label>
		<select id="filter_landuse">
		  <option value="">All</option>
		</select>

		<label>Rock type</label>
		<select id="filter_rock">
		  <option value="">All</option>
		</select>

		<button id="applyFilter">Apply</button>
		<button id="resetFilter">Reset</button>
		`;

		layersList.appendChild(filterContainer);

		// Fill dropdown menus with unique values from the crag dataset
		function fillDropdown(fieldName, selectId) {
			var values = new Set();
			var select = document.getElementById(selectId);

			json_Allcrags_3.features.forEach(function(feature) {
				var value = feature.properties[fieldName];

				if (value !== null && value !== undefined && String(value).trim() !== "") {
					values.add(String(value).trim());
				}
			});

			Array.from(values)
				.sort(function(a, b) {
					return a.localeCompare(b, undefined, {numeric: true, sensitivity: 'base'});
				})
				.forEach(function(value) {
					var option = document.createElement("option");
					
					option.value = value;

					// Show more user-friendly labels for Existing crags
					if (fieldName === "Existing crags") {
						option.textContent = (value === "1") ? "Existing crags" : "Possible crags";
					} else {
						option.textContent = value;
					}
					
					select.appendChild(option);
				});
		}
		
		// Populate all filter dropdowns
		fillDropdown("Existing crags", "filter_existing");
		fillDropdown("Protected area", "filter_protected");
		fillDropdown("Island / Mainland", "filter_island");
		fillDropdown("Coast / Inland", "filter_coast");
		fillDropdown("Land use", "filter_landuse");
		fillDropdown("Rock type", "filter_rock");
		
		// Apply all active filters to the crag layer
		function applyFilters() {
			var cliffMin = document.getElementById("filter_cliff").value;
			var distMax = document.getElementById("filter_distance").value;
			var existingVal = document.getElementById("filter_existing").value;
			var protectedVal = document.getElementById("filter_protected").value;
			var islandVal = document.getElementById("filter_island").value;
			var coastVal = document.getElementById("filter_coast").value;
			var landuseVal = document.getElementById("filter_landuse").value;
			var rockVal = document.getElementById("filter_rock").value;
			var areaMin = document.getElementById("filter_area").value;

			// Remove all currently displayed crag features
			layer_Allcrags_3.clearLayers();

			// Filter the original GeoJSON feature collection
			var filteredData = json_Allcrags_3.features.filter(function(feature) {
				// Shortcut to the feature attributes
				var p = feature.properties;

				// Parse numeric values for comparison
				var cliff = parseFloat(p["Cliff height [m]"]);
				var dist = parseFloat(p["Distance to streets [m]"]);
				var area = parseFloat(p["Area [m²]"]);

				// Read text/categorical values safely
				var existing = p["Existing crags"] !== null && p["Existing crags"] !== undefined ? String(p["Existing crags"]).trim() : "";
				var protectedArea = p["Protected area"] !== null && p["Protected area"] !== undefined ? String(p["Protected area"]).trim() : "";
				var island = p["Island / Mainland"] !== null && p["Island / Mainland"] !== undefined ? String(p["Island / Mainland"]).trim() : "";
				var coast = p["Coast / Inland"] !== null && p["Coast / Inland"] !== undefined ? String(p["Coast / Inland"]).trim() : "";
				var landuse = p["Land use"] !== null && p["Land use"] !== undefined ? String(p["Land use"]).trim() : "";
				var rock = p["Rock type"] !== null && p["Rock type"] !== undefined ? String(p["Rock type"]).trim() : "";

				// Check minimum cliff height
				if (cliffMin !== "" && (isNaN(cliff) || cliff < parseFloat(cliffMin))) return false;
				
				// Check maximum distance to streets
				if (distMax !== "" && (isNaN(dist) || dist > parseFloat(distMax))) return false;
				
				// Check minimum polygon area
				if (areaMin !== "" && (isNaN(area) || area < parseFloat(areaMin))) return false;

				// Check categorical filter values
				if (existingVal !== "" && existing !== existingVal) return false;
				if (protectedVal !== "" && protectedArea !== protectedVal) return false;
				if (islandVal !== "" && island !== islandVal) return false;
				if (coastVal !== "" && coast !== coastVal) return false;
				if (landuseVal !== "" && landuse !== landuseVal) return false;
				if (rockVal !== "" && rock !== rockVal) return false;

				// Keep the feature if all conditions are passed
				return true;
			});

			layer_Allcrags_3.addData(filteredData);
			rebuildClusterFromAllCrags();
			updateLayerVisibility();
		}

		// Reset all filters and restore the full dataset
		function resetFilters() {
			// Clear all filter input fields
			document.getElementById("filter_cliff").value = "";
			document.getElementById("filter_distance").value = "";
			document.getElementById("filter_existing").value = "";
			document.getElementById("filter_protected").value = "";
			document.getElementById("filter_island").value = "";
			document.getElementById("filter_coast").value = "";
			document.getElementById("filter_landuse").value = "";
			document.getElementById("filter_rock").value = "";
			document.getElementById("filter_area").value = "";

			layer_Allcrags_3.clearLayers();
			layer_Allcrags_3.addData(json_Allcrags_3);
			rebuildClusterFromAllCrags();
			updateLayerVisibility();
		}
		
		// Connect filter buttons to their functions
		document.getElementById("applyFilter").addEventListener("click", applyFilters);
		document.getElementById("resetFilter").addEventListener("click", resetFilters);
			
		// Marker cluster group for crags at lower zoom levels	
		var cluster_All = L.markerClusterGroup({
			disableClusteringAtZoom: 14
		});

		// Recreate cluster markers from the currently visible crag polygons
		function rebuildClusterFromAllCrags() {
			cluster_All.clearLayers();

			// Loop through every feature in the crag layer
			layer_Allcrags_3.eachLayer(function(layer) {
				if (layer.getBounds) {
					var center = layer.getBounds().getCenter();
					var marker = L.marker(center);

					if (layer.getPopup()) {
						marker.bindPopup(layer.getPopup().getContent());
					}

					cluster_All.addLayer(marker);
				}
			});
		}

		// Switch between polygon layer and clustered markers depending on zoom
		function updateLayerVisibility() {
			// Get current map zoom level
			var zoom = map.getZoom();

			// Show clusters at low zoom
			if (zoom < 14) {
				if (map.hasLayer(layer_Allcrags_3)) {
					map.removeLayer(layer_Allcrags_3);
				}
				if (!map.hasLayer(cluster_All)) {
					map.addLayer(cluster_All);
				}
			} else {
				if (map.hasLayer(cluster_All)) {
					map.removeLayer(cluster_All);
				}
				if (!map.hasLayer(layer_Allcrags_3)) {
					map.addLayer(layer_Allcrags_3);
				}
			}
		}

		rebuildClusterFromAllCrags();
		updateLayerVisibility();
		map.on('zoomend', updateLayerVisibility);
				
		// Fit the map to the bounds of all loaded layers		
        setBounds();
        </script>        
    </body>
</html>
